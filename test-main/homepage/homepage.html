<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 欢迎来到我的云端小屋 🧸</title>
    <style>
        :root {
            /* 还原第一版的清新蓝白色调，稍作柔化 */
            --bg-color: #f7f9fc;
            --primary-color: #3498db; /* 经典蓝色 */
            --accent-color: #f1c40f; /* 活泼的黄色 */
            --text-main: #34495e;
            --text-muted: #95a5a6;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        body {
            /* 优先使用圆润字体 */
            font-family: 'Yu Gothic', 'Hiragino Sans', 'Microsoft YaHei UI', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止滚动条 */
        }

        .container {
            width: 90%;
            max-width: 480px;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 软萌名片卡 */
        .profile-card {
            background: var(--card-bg);
            border-radius: 30px; /* 超大圆角 */
            padding: 60px 40px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 4px solid #fff; /* 增加一层白色边框，像贴纸一样 */
            position: relative;
        }

        /* 可爱 Octocat 图标盒 */
        .avatar-box {
            width: 100px;
            height: 100px;
            background-color: #fff;
            color: white;
            border-radius: 50%; /* 圆形 */
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.2);
            border: 5px solid var(--primary-color);
            animation: float 4s ease-in-out infinite; /* 飘浮动效 */
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .bio {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* Q 弹蓝色主按钮 */
        .github-link {
            display: inline-flex;
            align-items: center;
            background-color: var(--primary-color);
            color: white;
            padding: 16px 35px;
            border-radius: 40px; /* 胶囊形状 */
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 增加回弹效果 */
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.3);
            border: 2px solid transparent;
        }

        .github-link:hover {
            background-color: #2980b9;
            transform: translateY(-5px) scale(1.05); /* 向上浮动并放大 */
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.4);
        }

        .github-link:active {
            transform: translateY(2px) scale(0.98); /* 点击时轻微下压 */
        }

        .github-link svg {
            margin-right: 12px;
            fill: white;
        }

        /* 装饰用的小表情 */
        .decor {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.8;
        }
        .decor-1 { top: 30px; left: 30px; animation: rotate 6s linear infinite; }
        .decor-2 { bottom: 30px; right: 30px; animation: rotate 8s linear infinite reverse; }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 2px dashed #eee; /* 虚线 */
            padding-top: 25px;
        }

        /* --- 动画部分 --- */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <div class="decor decor-1">✨</div>
            <div class="decor decor-2">⭐</div>

            <div class="avatar-box">
                <span style="display:block; transform: scaleX(-1);">🐙</span>
            </div>
            
            <h1>蒋呈彦</h1>
            <p class="bio">
                这里是我的代码秘密基地！<br>
                里面藏着许多有趣的探索，快来看看吧～
            </p>

            <a href="https://github.com/CCraftsman" target="_blank" class="github-link">
                <svg height="22" viewBox="0 0 16 16" width="22"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                去 GitHub 看看鸭
            </a>

            <div class="footer">
                🎁 基于 GitHub 秘密仓库维护
            </div>
        </div>
    </div>

</body>
</html>
